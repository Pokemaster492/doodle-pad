<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Pad — Generative Kaleidoscope</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #05050a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    cursor: crosshair;
  }
  .panel {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(20, 20, 30, 0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 16px;
    color: #eee;
    width: 210px;
    transition: transform 0.25s ease, opacity 0.25s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .panel.hidden {
    transform: translateX(-240px);
    opacity: 0;
    pointer-events: none;
  }
  .panel h1 {
    font-size: 14px;
    margin: 0 0 10px 0;
    font-weight: 600;
    letter-spacing: 0.3px;
    opacity: 0.9;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .row label {
    font-size: 12px;
    opacity: 0.75;
    white-space: nowrap;
  }
  .row input[type="range"] {
    flex: 1;
    accent-color: #7c5cff;
  }
  select {
    background: rgba(255,255,255,0.08);
    color: #eee;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 3px 6px;
    font-size: 12px;
  }
  input[type="color"] {
    width: 28px;
    height: 22px;
    border: none;
    background: none;
    padding: 0;
    border-radius: 4px;
    cursor: pointer;
  }
  .btnrow {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  button {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #eee;
    padding: 7px 8px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover {
    background: rgba(255,255,255,0.18);
  }
  button.primary {
    background: linear-gradient(135deg, #7c5cff, #ff5cb3);
    border: none;
    font-weight: 600;
  }
  .toggle-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 9;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(20,20,30,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    color: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
    font-size: 16px;
    display: none;
  }
  .toggle-btn.show {
    display: flex;
  }
  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    z-index: 5;
    pointer-events: none;
    text-align: center;
  }
  input[type="checkbox"] {
    accent-color: #7c5cff;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="panel" id="panel">
  <h1>✨ Doodle Pad</h1>

  <div class="row">
    <label for="symmetry">Symmetry</label>
    <select id="symmetry">
      <option value="1">None</option>
      <option value="2">2-fold</option>
      <option value="4" selected>4-fold</option>
      <option value="6">6-fold</option>
      <option value="8">8-fold</option>
      <option value="12">12-fold</option>
    </select>
  </div>

  <div class="row">
    <label for="size">Brush</label>
    <input type="range" id="size" min="1" max="14" value="4" step="1">
  </div>

  <div class="row">
    <label for="trail">Trail</label>
    <input type="range" id="trail" min="2" max="40" value="14" step="1">
  </div>

  <div class="row">
    <label for="rainbow">Rainbow</label>
    <input type="checkbox" id="rainbow" checked>
  </div>

  <div class="row" id="colorRow" style="display:none;">
    <label for="color">Color</label>
    <input type="color" id="color" value="#7c5cff">
  </div>

  <div class="row">
    <label for="mirror">Mirror cursor</label>
    <input type="checkbox" id="mirror" checked>
  </div>

  <div class="btnrow">
    <button id="clearBtn">Clear</button>
    <button id="saveBtn" class="primary">Save PNG</button>
  </div>
  <div class="btnrow">
    <button id="hideBtn">Hide panel</button>
  </div>
</div>

<button class="toggle-btn" id="showBtn">☰</button>

<div class="hint">Draw anywhere · press <b>H</b> to hide UI · <b>C</b> to clear</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, cx, cy;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- UI elements ----
  const panel = document.getElementById('panel');
  const showBtn = document.getElementById('showBtn');
  const hideBtn = document.getElementById('hideBtn');
  const symmetrySel = document.getElementById('symmetry');
  const sizeInput = document.getElementById('size');
  const trailInput = document.getElementById('trail');
  const rainbowCheck = document.getElementById('rainbow');
  const colorRow = document.getElementById('colorRow');
  const colorInput = document.getElementById('color');
  const mirrorCheck = document.getElementById('mirror');
  const clearBtn = document.getElementById('clearBtn');
  const saveBtn = document.getElementById('saveBtn');

  function togglePanel(show) {
    if (show) {
      panel.classList.remove('hidden');
      showBtn.classList.remove('show');
    } else {
      panel.classList.add('hidden');
      showBtn.classList.add('show');
    }
  }
  hideBtn.addEventListener('click', () => togglePanel(false));
  showBtn.addEventListener('click', () => togglePanel(true));
  rainbowCheck.addEventListener('change', () => {
    colorRow.style.display = rainbowCheck.checked ? 'none' : 'flex';
  });

  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'h') {
      togglePanel(panel.classList.contains('hidden'));
    } else if (e.key.toLowerCase() === 'c') {
      particles.length = 0;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#05050a';
      ctx.fillRect(0, 0, W, H);
    }
  });

  clearBtn.addEventListener('click', () => {
    particles.length = 0;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#05050a';
    ctx.fillRect(0, 0, W, H);
  });

  saveBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = `doodle-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // init background
  ctx.fillStyle = '#05050a';
  ctx.fillRect(0, 0, W, H);

  // ---- Particle system ----
  const particles = [];
  let hueTime = 0;

  function spawn(x, y, size, color) {
    const n = 3;
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 1.4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 0.15,
        life: 1,
        decay: 0.012 + Math.random() * 0.02,
        size: size * (0.5 + Math.random() * 0.9),
        color
      });
    }
  }

  function currentColor() {
    if (rainbowCheck.checked) {
      hueTime += 1.6;
      const hue = hueTime % 360;
      return `hsl(${hue}, 90%, 62%)`;
    }
    return colorInput.value;
  }

  // ---- Symmetry drawing ----
  function drawAt(x, y, size, color) {
    const n = parseInt(symmetrySel.value, 10);
    const dx = x - cx;
    const dy = y - cy;
    const r = Math.sqrt(dx * dx + dy * dy);
    const baseAngle = Math.atan2(dy, dx);
    for (let i = 0; i < n; i++) {
      const angle = baseAngle + (Math.PI * 2 * i) / n;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      spawn(px, py, size, color);
    }
    if (mirrorCheck.checked && n > 1) {
      for (let i = 0; i < n; i++) {
        const angle = -baseAngle + (Math.PI * 2 * i) / n;
        const px = cx + Math.cos(angle) * r;
        const py = cy + Math.sin(angle) * r;
        spawn(px, py, size, color);
      }
    }
  }

  // ---- Pointer handling ----
  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function pointerDown(e) {
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    canvas.setPointerCapture(e.pointerId);
  }

  function pointerMove(e) {
    if (!drawing) return;
    const p = getPos(e);
    const size = parseFloat(sizeInput.value);
    const color = currentColor();

    const dist = Math.hypot(p.x - lastX, p.y - lastY);
    const steps = Math.max(1, Math.floor(dist / 3));
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      const ix = lastX + (p.x - lastX) * t;
      const iy = lastY + (p.y - lastY) * t;
      drawAt(ix, iy, size, color);
    }
    lastX = p.x; lastY = p.y;
  }

  function pointerUp(e) {
    drawing = false;
  }

  canvas.addEventListener('pointerdown', pointerDown);
  canvas.addEventListener('pointermove', pointerMove);
  canvas.addEventListener('pointerup', pointerUp);
  canvas.addEventListener('pointerleave', pointerUp);
  canvas.addEventListener('pointercancel', pointerUp);

  // ---- Animation loop ----
  function tick() {
    // fade trail
    const trail = parseFloat(trailInput.value);
    ctx.fillStyle = `rgba(5, 5, 10, ${trail / 400})`;
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.008; // slight gravity drift
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      const alpha = Math.max(0, p.life);
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
      grad.addColorStop(0, p.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = alpha;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

</body>
</html>
